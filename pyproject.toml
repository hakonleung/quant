[project]
name = "quant"
version = "0.0.0"
requires-python = ">=3.11"
description = "Quant stock-screening project (Python services workspace)"
dependencies = []

# uv workspace root: each service/* package becomes a workspace member.
[tool.uv.workspace]
members = ["services/py"]

[tool.uv]
managed = true

[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "mypy>=1.13",
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "hypothesis>=6.122",
    # Pull workspace member into the root env so `uv run` from root has
    # quant_core / quant_cache available without `--all-packages`.
    "quant-py",
    "akshare>=1.18.60",
]

[tool.uv.sources]
quant-py = { workspace = true }

# ---- ruff ----
[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "**/generated/**",
    # Generated by `pnpm gen:proto`; drift gated by `gen:proto:check`.
    "services/py/quant_core/contracts/**",
    ".venv",
    "data",
]

[tool.ruff.lint]
# Hard rules from CLAUDE.md §1.1
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # bugbear (no mutable defaults, ...)
    "UP",  # pyupgrade
    "SIM", # simplify
    "RUF", # ruff-specific
    "ANN", # annotations
    "TID", # tidy imports
    "TCH", # type-checking-only imports
    "C90", # mccabe complexity
    "N",   # pep8-naming
    "PT",  # pytest style
    "T20", # flake8-print (no print)
    "RET", # flake8-return
    "ERA", # eradicate (no commented-out code)
    "BLE", # blind-except
]
ignore = [
    # ANN401 bans `Any` in annotations; mypy --strict with disallow_any_explicit
    # already enforces this more strictly. ANN401 also fires on *args/**kwargs
    # where Any is unavoidable.
    "ANN401",
    # Line length is enforced by the formatter, not the linter.
    "E501",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["ANN", "S101", "PLR2004"]
"**/conftest.py" = ["ANN"]
# Cache exception class names mirror the doc-specified hierarchy
# (cache-abstraction.md §7: CacheKeyNotFound / CacheCorrupted / ...).
# We accept the "no Error suffix" naming there for readability.
"**/quant_cache/errors.py" = ["N818"]
# `SourceChainExhausted` follows the doc-specified naming
# (data-sources.md §3) — we accept the no-Error suffix here too.
"**/quant_core/services/source_chain.py" = ["N818"]
# Codegen is a CLI build tool; stdout/stderr is its primary interface, not "business log".
"proto/codegen/**" = ["T201"]
# Test-fixture entrypoint — uses `print` for the READY handshake the
# NestJS contract test waits on. Not a long-lived CLI.
"services/py/quant_rpc/__main__.py" = ["T201"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---- mypy ----
[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_unimported = true
disallow_any_explicit = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_equality = true
extra_checks = true
exclude = ["generated/", "data/", ".venv/"]
# Note: services/py/quant_core/contracts/ is *included* in mypy (we want to
# type-check generated files), but excluded from ruff format/lint so prettier-style
# formatting opinions don't fight the codegen.

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_any_explicit = false
disallow_untyped_calls = false
# pyarrow stubs miss most of `pyarrow.flight` / `pyarrow.compute` exports;
# tests touch these directly, but the runtime symbols exist.
disable_error_code = ["attr-defined", "name-defined"]
disallow_any_unimported = false

# pyarrow ships partial / incomplete stubs (no `pyarrow.compute.Expression`,
# untyped `pq.read_table` / `pq.write_table`, missing `pc.equal` / `pc.is_in`
# attrs, etc.). Relax the strict-mode checks that are unsatisfiable until
# upstream stubs improve. Scope is kept narrow to the cache adapter modules
# that actually consume pyarrow at the type level.
[[tool.mypy.overrides]]
module = [
    "quant_core.ports.cache",
    "quant_core.ports.kline_repo",
    "quant_core.services.kline_service",
    "quant_core.domain.rules.kline_assemble",
    "quant_io.llm.deepseek_client",
    "quant_cache.*",
    "quant_rpc.*",
]
disallow_any_unimported = false
disallow_untyped_calls = false
disallow_any_explicit = false
disallow_subclassing_any = false
disable_error_code = ["attr-defined", "name-defined", "import-untyped"]

# ---- pytest ----
[tool.pytest.ini_options]
minversion = "8.3"
testpaths = ["services/py/tests"]
# Make the repo root importable so tests can `from proto.codegen import ...`.
# `services/py` is added so `from tests._util.clock import FrozenClock` works
# without the package needing to be on the wheel install path.
pythonpath = [".", "services/py"]
markers = [
    "unit: fast pure tests (default in CI)",
    "integration: cross-module tests with real adapters on tmp paths",
    "contract: cross-process / cross-language contract tests",
    "property: hypothesis property-based tests",
    "e2e: end-to-end (run on demand)",
    "slow: long-running benchmarks",
]
addopts = ["-ra", "--strict-markers", "--strict-config"]
filterwarnings = ["error"]

[tool.coverage.run]
branch = true
source = ["services/py"]
omit = ["**/tests/**", "**/generated/**", "**/__main__.py"]
# The Flight server runs in a daemon thread under tests; without thread
# concurrency tracking, coverage.py would miss every line executed there.
concurrency = ["thread"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
    # Protocol / abstract method bodies are `...` placeholders — never executed.
    "^\\s*\\.\\.\\.\\s*$",
]
